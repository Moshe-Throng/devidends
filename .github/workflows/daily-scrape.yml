name: Daily Scrape & Deploy

on:
  schedule:
    # 5:00 AM UTC = 8:00 AM EAT (Nairobi)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        continue-on-error: true
        run: npx puppeteer browsers install chrome

      - name: Run crawl engine (opportunities)
        continue-on-error: true
        run: npx tsx scripts/crawl-engine/engine.ts --concurrency 3

      - name: Crawl development news
        continue-on-error: true
        run: npx tsx scripts/crawl-news.ts

      - name: Broadcast to Telegram
        continue-on-error: true
        run: npx tsx scripts/broadcast-group.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          TELEGRAM_JOBS_TOPIC_ID: ${{ secrets.TELEGRAM_JOBS_TOPIC_ID }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test-output/*.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update opportunity + news data [$(date -u '+%a %m/%d/%Y')]"
            git push
          fi

      - name: Deploy to Vercel
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }}
