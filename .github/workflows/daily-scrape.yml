name: Daily Scrape & Deploy

on:
  schedule:
    # 5:00 AM UTC = 8:00 AM EAT (Nairobi)
    - cron: '0 5 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  contents: write  # Required for git push

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Puppeteer browser
        continue-on-error: true
        run: npx puppeteer browsers install chrome

      - name: Run crawl engine (opportunities)
        continue-on-error: true
        run: npx tsx scripts/crawl-engine/engine.ts --concurrency 3

      - name: Crawl development news
        continue-on-error: true
        run: npx tsx scripts/crawl-news.ts

      # ── Devisor: Python pipeline/tender scrapers ──────────────
      - name: Setup Python (Devisor scrapers)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install playwright httpx && python -m playwright install chromium --with-deps

      - name: Run USAID Forecast scraper
        continue-on-error: true
        timeout-minutes: 4
        run: python ../tools/usaid_forecast_scraper.py --limit 50
        working-directory: .

      - name: Run Donor Jobs scraper
        continue-on-error: true
        timeout-minutes: 4
        run: python ../tools/donor_jobs_scraper.py --limit 30
        working-directory: .

      - name: Run TradeMark Africa scraper
        continue-on-error: true
        timeout-minutes: 4
        run: python ../tools/trademark_africa_scraper.py --limit 50
        working-directory: .

      - name: Run World Bank STEP scraper
        continue-on-error: true
        timeout-minutes: 4
        run: python ../tools/worldbank_step_scraper.py --limit 50
        working-directory: .

      - name: Run UNGM scraper (enhanced)
        continue-on-error: true
        timeout-minutes: 4
        run: python ../tools/ungm_ethiopia_scraper.py --days 30 --limit 50
        working-directory: .

      # ── Devisor: Merge Python + TS output ──────────────────────
      - name: Merge Devisor sources
        continue-on-error: true
        run: npx tsx scripts/merge-devisor-sources.ts

      # ── Publish to Supabase ────────────────────────────────────
      - name: Publish to Supabase
        continue-on-error: true
        run: npx tsx scripts/publish-to-supabase.ts
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Send email alerts
        continue-on-error: true
        run: npx tsx scripts/send-alerts-email.ts
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://devidends.vercel.app

      - name: Broadcast to Telegram
        continue-on-error: true
        run: npx tsx scripts/broadcast-group.ts
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_ID: ${{ secrets.TELEGRAM_GROUP_ID }}
          TELEGRAM_JOBS_TOPIC_ID: ${{ secrets.TELEGRAM_JOBS_TOPIC_ID }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_SITE_URL: https://devidends.vercel.app

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git ls-files --others --modified --exclude-standard -- 'test-output/*.json' | xargs -r git add
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "Update opportunity + news data [$(date -u '+%a %m/%d/%Y')]"
            git pull --rebase origin main
            git push
          fi

      - name: Deploy to Vercel
        continue-on-error: true
        run: npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} --scope sheklave-9191s-projects
